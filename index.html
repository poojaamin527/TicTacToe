<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <button class="sound-btn" id="mute-btn" aria-pressed="false" aria-label="Toggle sound">Mute</button>
    <h1>Tic Tac Toe</h1>

    <div class="status" id="status">Player 🌮's turn</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="scoreboard">
      <div class="score-card x-card">
        <span class="score-label">Player 🌮</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-card draw-card">
        <span class="score-label">Draws</span>
        <span class="score-value" id="score-draw">0</span>
      </div>
      <div class="score-card o-card">
        <span class="score-label">Player 🍕</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <button class="reset-btn" id="reset-btn">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
